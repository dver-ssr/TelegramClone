name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv git zip unzip \
            openjdk-17-jdk build-essential libssl-dev libffi-dev \
            libncurses5 libstdc++6 zlib1g autoconf libtool

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install Cython==0.29.36 buildozer
          pip install -r requirements.txt

      - name: Init buildozer spec
        run: |
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          sed -i "s|^title = .*|title = TelegramClone|" buildozer.spec
          sed -i "s|^package.name = .*|package.name = telegramclone|" buildozer.spec
          sed -i "s|^package.domain = .*|package.domain = org.example|" buildozer.spec
          sed -i "s|^source.main = .*|source.main = kivy_client.py|" buildozer.spec
          sed -i "s|^requirements = .*|requirements = python3,kivy==2.3.0,flask,flask-socketio,flask-sqlalchemy,eventlet,python-socketio,requests|" buildozer.spec
          sed -i "s|^android.permissions = .*|android.permissions = INTERNET|" buildozer.spec
          sed -i "s|^android.api = .*|android.api = 33|" buildozer.spec
          sed -i "s|^android.minapi = .*|android.minapi = 21|" buildozer.spec
          sed -i "s|^android.ndk = .*|android.ndk = 25b|" buildozer.spec

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegramClone-APK
          path: bin/*.apk
