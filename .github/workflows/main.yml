name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Create buildozer.spec
        run: |
          cd TelegramClone
          cat > buildozer.spec << 'SPECEOF'
[app]
title = TelegramClone
package.name = telegramclone
package.domain = org.example
source.dir = .
source.main = kivy_client.py
version = 0.1
requirements = python3,kivy==2.3.0,python-socketio,requests
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a
android.accept_sdk_license = True
[buildozer]
log_level = 2
SPECEOF

      - name: Build APK via Docker
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          workdir: TelegramClone
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegramClone-APK
          path: ${{ steps.buildozer.outputs.filename }}
